:root{
  --orange:#E8A020;
  --orange-light:#F5B84A;
  --orange-dark:#B87A10;

  --dark:#141414;
  --card:#1A1A1A;
  --card-hover:#202020;
  --border:#2A2A2A;
  --border-light:#333;
  --text:#F0F0F0;
  --text-muted:#888;
  --text-dim:#555;

*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--black);}
body{color:var(--text);font-family:"Noto Sans JP",sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;}
.bebas{font-family:"Bebas Neue",sans-serif;}
.mono{font-family:"JetBrains Mono",monospace;}
button{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
.fade-up{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;}

/* SPLASH */
#splash{
  position:fixed;inset:0;background:var(--black);z-index:900;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .45s ease, visibility .45s ease;
}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.splash-logo-img{width:110px;animation:scaleIn .5s cubic-bezier(.16,1,.3,1) both;filter:drop-shadow(0 8px 30px rgba(232,160,32,.25));}

/* HEADER */
.top-header{
  position:sticky;top:0;z-index:50;background:var(--dark);border-bottom:1px solid var(--border);
  padding:0 16px;
}
.top-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;height:54px;gap:12px;}
.back-btn{
  display:flex;align-items:center;gap:5px;color:var(--text-muted);text-decoration:none;
  font-size:12.5px;font-weight:600;transition:color .15s;
}
.back-btn:hover{color:var(--orange);}
.top-title{flex:1;font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:.05em;text-align:center;}
.top-logo{height:24px;width:auto;}

.main{max-width:640px;margin:0 auto;padding:30px 20px 90px;}

.doc-hero{text-align:center;padding:18px 10px 32px;}
.doc-hero-icon{
  width:64px;height:64px;border-radius:16px;background:var(--orange-bg);border:1px solid rgba(232,160,32,.25);
  display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 18px;
}
.doc-hero-title{font-family:"Noto Sans JP",sans-serif;font-weight:900;font-size:21px;line-height:1.5;margin-bottom:10px;}
.doc-hero-desc{font-size:12.5px;color:var(--text-muted);line-height:1.85;max-width:420px;margin:0 auto;}

.drive-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 22px;
  text-align:center;margin-bottom:14px;
}
.drive-icon{width:48px;height:48px;margin:0 auto 16px;}
.drive-card-title{font-size:15px;font-weight:700;margin-bottom:6px;}
.drive-card-desc{font-size:12px;color:var(--text-muted);line-height:1.7;margin-bottom:20px;}
.drive-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--orange);color:var(--black);text-decoration:none;
  font-family:"Bebas Neue",sans-serif;font-size:15px;letter-spacing:.05em;
  padding:13px 26px;border-radius:9px;transition:all .2s;
}
.drive-btn:hover{background:var(--orange-light);transform:translateY(-1px);}
.drive-btn svg{width:17px;height:17px;}

.doc-note{
  font-size:11.5px;color:var(--text-dim);line-height:1.8;text-align:center;
  background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-top:4px;
}
.doc-note strong{color:var(--text-muted);}

.footer-note{
  text-align:center;font-size:11px;color:var(--text-dim);margin-top:40px;line-height:1.8;
}
.footer-note img{height:16px;width:auto;display:inline-block;vertical-align:middle;opacity:.5;margin-right:5px;}

/* 下部タブバー */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:300;
  background:rgba(20,20,20,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;justify-content:space-around;
  padding-bottom:env(safe-area-inset-bottom);
}
.tabbar-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  padding:9px 4px 8px;color:var(--text-dim);text-decoration:none;cursor:pointer;
  transition:color .15s;-webkit-tap-highlight-color:transparent;background:none;border:none;font-family:inherit;
}
.tabbar-item svg{width:21px;height:21px;}
.tabbar-item .tb-label{font-size:10px;font-weight:700;letter-spacing:.02em;}
.tabbar-item.active{color:var(--orange);}
.tabbar-item:active{opacity:.7;}
