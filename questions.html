<style>
:root{
  --orange:#E8A020;
  --orange-light:#F5B84A;
  --orange-dark:#B87A10;
  --orange-bg:rgba(232,160,32,0.08);
  --black:#0C0C0C;
  --dark:#141414;
  --card:#1A1A1A;
  --card-hover:#202020;
  --border:#2A2A2A;
  --border-light:#333;
  --text:#F0F0F0;
  --text-muted:#888;
  --text-dim:#555;
  --keep:#F06060;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--black);}
body{color:var(--text);font-family:"Noto Sans JP",sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;}
.bebas{font-family:"Bebas Neue",sans-serif;}
.mono{font-family:"JetBrains Mono",monospace;}
button{font-family:inherit;}
textarea,input{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
.fade-up{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;}

/* SPLASH */
#splash{
  position:fixed;inset:0;background:var(--black);z-index:900;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .45s ease, visibility .45s ease;
}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.splash-logo-img{width:110px;animation:scaleIn .5s cubic-bezier(.16,1,.3,1) both;filter:drop-shadow(0 8px 30px rgba(232,160,32,.25));}

/* HEADER */
.top-header{
  position:sticky;top:0;z-index:50;background:var(--dark);border-bottom:1px solid var(--border);
  padding:env(safe-area-inset-top) 16px 0;
}
.top-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;height:54px;gap:12px;}
.back-btn{
  display:flex;align-items:center;gap:5px;color:var(--text-muted);text-decoration:none;
  font-size:12.5px;font-weight:600;transition:color .15s;
}
.back-btn:hover{color:var(--orange);}
.top-title{flex:1;font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:.05em;text-align:center;}
.top-logo{height:24px;width:auto;}

.main{max-width:680px;margin:0 auto;padding:18px 16px 110px;}

.q-intro{
  font-size:12px;color:var(--text-muted);line-height:1.8;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 15px;margin-bottom:18px;
}
.q-intro strong{color:var(--text);}

.q-list{display:flex;flex-direction:column;gap:10px;}
.q-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 16px 14px;
}
.q-card-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.q-author{
  font-size:11px;font-weight:700;color:var(--text-muted);
  display:flex;align-items:center;gap:5px;
}
.q-author.anon{color:var(--text-dim);}
.q-author-icon{
  width:20px;height:20px;border-radius:50%;background:var(--orange-bg);color:var(--orange);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;
}
.q-author-icon.anon{background:var(--border);color:var(--text-dim);}
.q-time{font-size:10px;color:var(--text-dim);margin-left:auto;flex-shrink:0;}
.q-content{font-size:13.5px;line-height:1.75;white-space:pre-wrap;color:var(--text);margin-bottom:10px;}

.q-actions{display:flex;align-items:center;gap:14px;padding-top:8px;border-top:1px solid var(--border);}
.q-reply-toggle{
  background:none;border:none;color:var(--text-muted);font-size:11.5px;font-weight:700;
  display:flex;align-items:center;gap:5px;cursor:pointer;padding:4px 0;transition:color .15s;
}
.q-reply-toggle:hover{color:var(--orange);}
.q-reply-toggle svg{width:14px;height:14px;}
.q-reply-count{color:var(--orange);}

.q-replies{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);display:none;flex-direction:column;gap:10px;}
.q-replies.open{display:flex;}
.q-reply-item{
  display:flex;gap:9px;padding-left:4px;
}
.q-reply-body{flex:1;min-width:0;}
.q-reply-head{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.q-reply-author{font-size:10.5px;font-weight:700;color:var(--text-muted);}
.q-reply-author.anon{color:var(--text-dim);}
.q-reply-time{font-size:9.5px;color:var(--text-dim);}
.q-reply-text{font-size:12.5px;line-height:1.65;color:var(--text);white-space:pre-wrap;}

.q-reply-form{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.q-reply-input-row{display:flex;gap:8px;}
.q-reply-input{
  flex:1;background:var(--black);border:1px solid var(--border-light);border-radius:8px;
  color:var(--text);padding:9px 12px;font-size:12.5px;outline:none;resize:none;
  transition:border-color .15s;min-height:38px;
}
.q-reply-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,160,32,.12);}
.q-reply-input::placeholder{color:var(--text-dim);}
.q-reply-send{
  flex-shrink:0;width:38px;height:38px;border-radius:8px;background:var(--orange);color:var(--black);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.q-reply-send:hover{background:var(--orange-light);}
.q-reply-send:disabled{background:var(--border);color:var(--text-dim);cursor:not-allowed;}
.q-reply-toggle-anon{
  display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--text-dim);cursor:pointer;user-select:none;
}

.empty-state{
  text-align:center;padding:50px 20px;color:var(--text-dim);font-size:12.5px;line-height:1.8;
}

/* FAB */
.fab{
  position:fixed;right:20px;bottom:calc(24px + 64px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;
  background:var(--orange);color:var(--black);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(232,160,32,.4);
  transition:all .2s;z-index:60;
}
.fab:hover{background:var(--orange-light);transform:scale(1.06);}
.fab:active{transform:scale(.96);}

/* MODAL（投稿フォーム） */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;
  align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex;}
@media (min-width:560px){ .modal-overlay{align-items:center;padding:20px;} }
.modal-box{
  background:var(--dark);border:1px solid var(--border);border-radius:18px 18px 0 0;
  padding:22px 20px 28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;
  animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both;
}
@media (min-width:560px){ .modal-box{border-radius:16px;} }
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:.04em;}
.modal-close{
  width:30px;height:30px;border-radius:8px;background:var(--card);border:1px solid var(--border);
  color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;
}
.f-label{font-size:11px;color:var(--text-muted);margin-bottom:5px;margin-top:14px;font-weight:600;}
.f-label:first-of-type{margin-top:0;}
.field{
  background:var(--black);border:1px solid var(--border-light);border-radius:8px;
  color:var(--text);padding:11px 13px;font-size:14px;width:100%;
  outline:none;transition:border-color .15s;resize:vertical;
}
.field:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,160,32,.12);}
.field::placeholder{color:var(--text-dim);}

.anon-toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:13px 14px;margin-top:16px;
}
.anon-toggle-label{font-size:12.5px;font-weight:700;}
.anon-toggle-desc{font-size:10.5px;color:var(--text-muted);margin-top:2px;}
.switch{position:relative;width:46px;height:26px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.switch-slider{
  position:absolute;cursor:pointer;inset:0;background:var(--border-light);border-radius:13px;transition:.2s;
}
.switch-slider::before{
  position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;
  background:var(--text-muted);border-radius:50%;transition:.2s;
}
.switch input:checked + .switch-slider{background:var(--orange);}
.switch input:checked + .switch-slider::before{transform:translateX(20px);background:var(--black);}

.modal-error{
  font-size:11.5px;color:#F06060;background:rgba(240,96,96,.1);border:1px solid rgba(240,96,96,.3);
  border-radius:6px;padding:9px 11px;margin-top:14px;display:none;line-height:1.5;
}
.modal-error.show{display:block;}
.modal-actions{display:flex;gap:10px;margin-top:22px;}
.btn{
  flex:1;padding:13px;border-radius:9px;border:none;cursor:pointer;font-size:13.5px;font-weight:700;
  transition:all .18s;
}
.btn-primary{background:var(--orange);color:var(--black);}
.btn-primary:hover{background:var(--orange-light);}
.btn-primary:disabled{background:var(--border);color:var(--text-dim);cursor:not-allowed;}

/* 下部タブバー */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:300;
  background:rgba(20,20,20,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;justify-content:space-around;
  padding-bottom:env(safe-area-inset-bottom);
}
.tabbar-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  padding:9px 4px 8px;color:var(--text-dim);text-decoration:none;cursor:pointer;
  transition:color .15s;-webkit-tap-highlight-color:transparent;background:none;border:none;font-family:inherit;
}
.tabbar-item svg{width:21px;height:21px;}
.tabbar-item .tb-label{font-size:10px;font-weight:700;letter-spacing:.02em;}
.tabbar-item.active{color:var(--orange);}
.tabbar-item:active{opacity:.7;}
</style>
</head>

<div id="splash"><img class="splash-logo-img" src="assets/logo-icon-dark.png" alt="K-PICS"></div>

<header class="top-header">
  <div class="top-inner">
    <a class="back-btn" href="index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      ホーム
    </a>
    <div class="top-title">質問</div>
    <img class="top-logo" src="assets/logo-icon-dark.png" alt="K-PICS">
  </div>
</header>

<div class="main fade-up">

  <div class="q-intro">
    ふとした疑問を気軽に投稿できる場所です。<strong>匿名・実名</strong>どちらでも投稿できます。コメントで返信し合いましょう。
  </div>

  <div class="q-list" id="q-list">
    <div class="empty-state">読み込み中...</div>
  </div>

</div>

<button class="fab" onclick="openPostModal()" title="質問を投稿" aria-label="質問を投稿">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
</button>

<!-- 質問投稿モーダル -->
<div class="modal-overlay" id="post-overlay" onclick="closeOnOverlay(event,'post-overlay')">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title">質問を投稿</div>
      <button class="modal-close" onclick="closeModal('post-overlay')">✕</button>
    </div>

    <div class="f-label">質問の内容 <span style="color:var(--orange);">*</span></div>
    <textarea class="field" id="post-content" rows="5" placeholder="気になったこと、分からないことを書いてみよう"></textarea>

    <div class="anon-toggle-row">
      <div>
        <div class="anon-toggle-label">匿名で投稿する</div>
        <div class="anon-toggle-desc">ONにすると名前は「匿名」と表示されます</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="post-anon-toggle">
        <span class="switch-slider"></span>
      </label>
    </div>

    <div class="modal-error" id="post-error"></div>

    <div class="modal-actions">
      <button class="btn btn-primary" id="post-submit-btn" onclick="submitQuestion()">投稿する</button>
    </div>
  </div>
</div>

<!-- 下部タブバー -->
<nav class="tabbar" id="main-tabbar">
  <a class="tabbar-item" data-tab="home" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
    <span class="tb-label">ホーム</span>
  </a>
  <a class="tabbar-item" data-tab="calendar" href="calendar.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    <span class="tb-label">カレンダー</span>
  </a>
  <a class="tabbar-item" data-tab="documents" href="documents.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
    <span class="tb-label">資料</span>
  </a>
  <a class="tabbar-item" data-tab="questions" href="questions.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
    <span class="tb-label">質問</span>
  </a>
</nav>

<script src="auth-guard.js"></script>
<script src="tabbar.js"></script>
<script src="questions.js"></script>
