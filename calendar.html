<style>
:root{
  --orange:#E8A020;
  --orange-light:#F5B84A;
  --orange-dark:#B87A10;
  --orange-bg:rgba(232,160,32,0.08);
  --black:#0C0C0C;
  --dark:#141414;
  --card:#1A1A1A;
  --card-hover:#202020;
  --border:#2A2A2A;
  --border-light:#333;
  --text:#F0F0F0;
  --text-muted:#888;
  --text-dim:#555;
  --keep:#F06060;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--black);}
body{color:var(--text);font-family:"Noto Sans JP",sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;}
.bebas{font-family:"Bebas Neue",sans-serif;}
.mono{font-family:"JetBrains Mono",monospace;}
button{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
.fade-up{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;}

/* SPLASH (短縮版・ページ遷移ごとに表示) */
#splash{
  position:fixed;inset:0;background:var(--black);z-index:900;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .45s ease, visibility .45s ease;
}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.splash-logo-img{width:110px;animation:scaleIn .5s cubic-bezier(.16,1,.3,1) both;filter:drop-shadow(0 8px 30px rgba(232,160,32,.25));}

/* HEADER */
.top-header{
  position:sticky;top:0;z-index:50;background:var(--dark);border-bottom:1px solid var(--border);
  padding:0 16px;
}
.top-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;height:54px;gap:12px;}
.back-btn{
  display:flex;align-items:center;gap:5px;color:var(--text-muted);text-decoration:none;
  font-size:12.5px;font-weight:600;transition:color .15s;
}
.back-btn:hover{color:var(--orange);}
.top-title{flex:1;font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:.05em;text-align:center;}
.top-logo{height:24px;width:auto;}

.main{max-width:760px;margin:0 auto;padding:18px 16px 100px;}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.month-nav-btn{
  width:36px;height:36px;border-radius:8px;background:var(--card);border:1px solid var(--border);
  color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;
}
.month-nav-btn:hover{border-color:var(--orange);color:var(--orange);}
.month-label{font-family:"Bebas Neue",sans-serif;font-size:24px;letter-spacing:.04em;}
.month-today-btn{
  font-size:11px;font-weight:700;color:var(--orange);background:var(--orange-bg);
  border:1px solid rgba(232,160,32,.25);padding:5px 10px;border-radius:6px;cursor:pointer;margin-left:8px;
}

/* CALENDAR GRID */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-dow{text-align:center;font-size:10.5px;color:var(--text-dim);font-weight:700;padding-bottom:6px;letter-spacing:.04em;}
.cal-dow.sun{color:#E0707A;}
.cal-dow.sat{color:#6FA8E0;}
.cal-cell{
  aspect-ratio:1/1;border-radius:9px;background:var(--card);border:1px solid var(--border);
  padding:5px 4px;cursor:pointer;transition:all .15s;position:relative;
  display:flex;flex-direction:column;gap:2px;overflow:hidden;
}
.cal-cell:hover{border-color:var(--border-light);background:var(--card-hover);}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-cell.today{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange) inset;}
.cal-cell.selected{background:var(--orange-bg);border-color:var(--orange);}
.cal-daynum{font-size:11.5px;font-weight:700;color:var(--text-muted);}
.cal-cell.today .cal-daynum{color:var(--orange);}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;margin-top:auto;}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);flex-shrink:0;}
.cal-evt-mini{
  font-size:8.5px;color:var(--orange-light);background:var(--orange-bg);border-radius:3px;
  padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;
}

/* AGENDA */
.agenda-label{
  font-size:10.5px;font-weight:700;letter-spacing:.12em;color:var(--orange);text-transform:uppercase;
  margin:28px 0 10px;display:flex;align-items:center;gap:8px;
}
.agenda-label::after{content:"";flex:1;height:1px;background:var(--border);}
.agenda-list{display:flex;flex-direction:column;gap:8px;}
.evt-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 15px;
  display:flex;gap:12px;cursor:pointer;transition:all .15s;
}
.evt-card:hover{border-color:var(--border-light);background:var(--card-hover);}
.evt-date-chip{
  width:46px;height:46px;border-radius:9px;background:var(--orange-bg);flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.evt-date-chip .d{font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--orange);line-height:1;}
.evt-date-chip .m{font-size:9px;color:var(--orange-light);font-weight:700;letter-spacing:.04em;}
.evt-body{flex:1;min-width:0;}
.evt-title{font-size:14px;font-weight:700;line-height:1.4;}
.evt-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:5px;}
.evt-meta-item{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px;}
.empty-state{
  text-align:center;padding:40px 20px;color:var(--text-dim);font-size:12.5px;line-height:1.8;
}

/* FAB */
.fab{
  position:fixed;right:20px;bottom:24px;width:56px;height:56px;border-radius:50%;
  background:var(--orange);color:var(--black);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(232,160,32,.4);
  transition:all .2s;z-index:60;
}
.fab:hover{background:var(--orange-light);transform:scale(1.06);}
.fab:active{transform:scale(.96);}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;
  align-items:flex-end;justify-content:center;padding:0;
}
.modal-overlay.open{display:flex;}
@media (min-width:560px){
  .modal-overlay{align-items:center;padding:20px;}
}
.modal-box{
  background:var(--dark);border:1px solid var(--border);border-radius:18px 18px 0 0;
  padding:22px 20px 28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;
  animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both;
}
@media (min-width:560px){
  .modal-box{border-radius:16px;}
}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:.04em;}
.modal-close{
  width:30px;height:30px;border-radius:8px;background:var(--card);border:1px solid var(--border);
  color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;
}
.f-label{font-size:11px;color:var(--text-muted);margin-bottom:5px;margin-top:14px;font-weight:600;}
.f-label:first-of-type{margin-top:0;}
.field{
  background:var(--black);border:1px solid var(--border-light);border-radius:8px;
  color:var(--text);padding:11px 13px;font-size:14px;width:100%;
  font-family:"Noto Sans JP",sans-serif;outline:none;transition:border-color .15s;resize:vertical;
}
.field:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,160,32,.12);}
.field::placeholder{color:var(--text-dim);}
.field-row{display:flex;gap:10px;}
.field-row .field-col{flex:1;}
.modal-error{
  font-size:11.5px;color:#F06060;background:rgba(240,96,96,.1);border:1px solid rgba(240,96,96,.3);
  border-radius:6px;padding:9px 11px;margin-top:14px;display:none;line-height:1.5;
}
.modal-error.show{display:block;}
.modal-actions{display:flex;gap:10px;margin-top:22px;}
.btn{
  flex:1;padding:13px;border-radius:9px;border:none;cursor:pointer;font-size:13.5px;font-weight:700;
  transition:all .18s;font-family:"Noto Sans JP",sans-serif;
}
.btn-primary{background:var(--orange);color:var(--black);}
.btn-primary:hover{background:var(--orange-light);}
.btn-primary:disabled{background:var(--border);color:var(--text-dim);cursor:not-allowed;}
.btn-ghost{background:var(--card);color:var(--text-muted);border:1px solid var(--border-light);flex:0 0 auto;padding:13px 16px;}
.btn-ghost:hover{border-color:var(--keep);color:var(--keep);}

/* DETAIL VIEW INSIDE MODAL */
.detail-meta-row{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text);padding:9px 0;border-bottom:1px solid var(--border);}
.detail-meta-row:last-of-type{border-bottom:none;}
.detail-meta-row .ic{width:18px;text-align:center;opacity:.7;flex-shrink:0;}
.detail-desc{
  margin-top:14px;font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;
  background:var(--black);border:1px solid var(--border);border-radius:9px;padding:13px 14px;
}
.detail-created{font-size:10.5px;color:var(--text-dim);margin-top:14px;text-align:right;}
</style>
</head>
<body>

<div id="splash"><img class="splash-logo-img" src="assets/logo-icon-dark.png" alt="K-PICS"></div>

<header class="top-header">
  <div class="top-inner">
    <a class="back-btn" href="index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      ホーム
    </a>
    <div class="top-title">イベントカレンダー</div>
    <img class="top-logo" src="assets/logo-icon-dark.png" alt="K-PICS">
  </div>
</header>

<div class="main">
  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth(-1)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div style="display:flex;align-items:center;">
      <div class="month-label" id="month-label">—</div>
      <button class="month-today-btn" onclick="goToday()">今日</button>
    </div>
    <button class="month-nav-btn" onclick="changeMonth(1)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="cal-grid" id="cal-dow-row">
    <div class="cal-dow sun">日</div>
    <div class="cal-dow">月</div>
    <div class="cal-dow">火</div>
    <div class="cal-dow">水</div>
    <div class="cal-dow">木</div>
    <div class="cal-dow">金</div>
    <div class="cal-dow sat">土</div>
  </div>
  <div class="cal-grid" id="cal-grid" style="margin-top:5px;"></div>

  <div class="agenda-label" id="agenda-label">今後の予定</div>
  <div class="agenda-list" id="agenda-list">
    <div class="empty-state">読み込み中...</div>
  </div>
</div>

<button class="fab" onclick="openCreateModal()" title="イベントを追加" aria-label="イベントを追加">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
</button>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="detail-overlay" onclick="closeOnOverlay(event,'detail-overlay')">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="detail-title-h">詳細</div>
      <button class="modal-close" onclick="closeModal('detail-overlay')">✕</button>
    </div>
    <div id="detail-body"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="openEditModal(currentDetailId)">編集する</button>
      <button class="btn-ghost" onclick="confirmDelete(currentDetailId)">削除</button>
    </div>
  </div>
</div>

<!-- 追加・編集モーダル -->
<div class="modal-overlay" id="form-overlay" onclick="closeOnOverlay(event,'form-overlay')">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="form-title-h">イベントを追加</div>
      <button class="modal-close" onclick="closeModal('form-overlay')">✕</button>
    </div>

    <div class="f-label">イベント名 <span style="color:var(--orange);">*</span></div>
    <input class="field" id="f-title" placeholder="例：FAST講習会">

    <div class="field-row">
      <div class="field-col">
        <div class="f-label">日付 <span style="color:var(--orange);">*</span></div>
        <input class="field" type="date" id="f-date">
      </div>
      <div class="field-col">
        <div class="f-label">時間</div>
        <input class="field" id="f-time" placeholder="例：19:00〜 / TBD">
      </div>
    </div>

    <div class="f-label">場所</div>
    <input class="field" id="f-location" placeholder="例：第3講義室 / Zoom">

    <div class="f-label">詳しい説明</div>
    <textarea class="field" id="f-desc" rows="4" placeholder="案内文、Zoom ID、持ち物など"></textarea>

    <div class="modal-error" id="form-error"></div>

    <div class="modal-actions">
      <button class="btn btn-primary" id="form-submit-btn" onclick="submitForm()">保存する</button>
    </div>
  </div>
</div>

<script src="calendar.js"></script>
</body>
</html>
