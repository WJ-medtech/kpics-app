<style>
:root{
  --orange:#E8A020;
  --orange-light:#F5B84A;
  --orange-dark:#B87A10;
  --orange-bg:rgba(232,160,32,0.08);
  --black:#0C0C0C;
  --dark:#141414;
  --card:#1A1A1A;
  --card-hover:#202020;
  --border:#2A2A2A;
  --border-light:#333;
  --text:#F0F0F0;
  --text-muted:#888;
  --text-dim:#555;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--black);}
body{color:var(--text);font-family:"Noto Sans JP",sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;}
.bebas{font-family:"Bebas Neue",sans-serif;}
.mono{font-family:"JetBrains Mono",monospace;}
button{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
.fade-up{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;}

/* SPLASH */
#splash{
  position:fixed;inset:0;background:var(--black);z-index:900;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .45s ease, visibility .45s ease;
}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.splash-logo-img{width:110px;animation:scaleIn .5s cubic-bezier(.16,1,.3,1) both;filter:drop-shadow(0 8px 30px rgba(232,160,32,.25));}

/* HEADER */
.top-header{
  position:sticky;top:0;z-index:50;background:var(--dark);border-bottom:1px solid var(--border);
  padding:env(safe-area-inset-top) 16px 0;
}
.top-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;height:54px;gap:12px;}
.back-btn{
  display:flex;align-items:center;gap:5px;color:var(--text-muted);text-decoration:none;
  font-size:12.5px;font-weight:600;transition:color .15s;white-space:nowrap;
}
.back-btn:hover{color:var(--orange);}
.top-title{flex:1;font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:.05em;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top-logo{height:24px;width:auto;flex-shrink:0;}

.main{max-width:640px;margin:0 auto;padding:26px 20px 90px;}

.region-hero{text-align:center;padding:6px 10px 26px;}
.region-hero-title{font-family:"Noto Sans JP",sans-serif;font-weight:900;font-size:22px;line-height:1.5;margin-bottom:6px;}
.region-hero-desc{font-size:12px;color:var(--text-muted);line-height:1.8;}

.edit-fab{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:var(--orange);color:var(--black);border:none;border-radius:12px;
  padding:14px;font-family:"Bebas Neue",sans-serif;font-size:15px;letter-spacing:.05em;
  cursor:pointer;margin-bottom:22px;transition:all .2s;
}
.edit-fab:hover{background:var(--orange-light);transform:translateY(-1px);}
.edit-fab svg{width:17px;height:17px;}

/* 項目カード */
.item-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:18px 20px;margin-bottom:12px;
}
.item-card-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.item-card-num{
  font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--orange);
  background:var(--orange-bg);border:1px solid rgba(232,160,32,.25);
  width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.item-card-label{font-size:13.5px;font-weight:700;}
.item-card-body{
  font-size:13px;line-height:1.85;color:var(--text);white-space:pre-wrap;word-break:break-word;
  padding-left:36px;
}
.item-card-body.empty{color:var(--text-dim);font-style:italic;}

/* ⑧⑨ 失敗例・コツ投稿セクション */
.tip-section{margin-top:8px;}
.tip-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;}
.tip-section-title{font-size:14px;font-weight:900;display:flex;align-items:center;gap:8px;min-width:0;}
.tip-add-btn{
  background:var(--orange-bg);border:1px solid rgba(232,160,32,.3);color:var(--orange);
  font-size:11.5px;font-weight:700;padding:7px 12px;border-radius:8px;cursor:pointer;flex-shrink:0;
}
.tip-add-btn:hover{background:rgba(232,160,32,.18);}
.tip-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.tip-card-text{font-size:13px;line-height:1.75;white-space:pre-wrap;word-break:break-word;margin-bottom:10px;}
.tip-card-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.tip-card-author{font-size:11px;color:var(--text-muted);}
.tip-card-actions{display:flex;gap:12px;flex-shrink:0;}
.tip-card-action{background:none;border:none;color:var(--text-dim);font-size:11px;cursor:pointer;font-weight:700;padding:0;}
.tip-card-action:hover{color:var(--orange);}
.tip-card-action.danger:hover{color:#e85050;}
.tip-empty{font-size:12px;color:var(--text-dim);padding:4px 2px 14px;}
.tip-form{background:var(--card);border:1px solid var(--border-light);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.tip-textarea{
  width:100%;background:var(--black);border:1px solid var(--border-light);border-radius:9px;
  color:var(--text);font-size:13px;line-height:1.65;padding:11px 13px;font-family:inherit;
  resize:vertical;min-height:64px;margin-bottom:10px;
}
.tip-form-actions{display:flex;gap:8px;}
.tip-form-btn{flex:1;border:none;border-radius:8px;padding:10px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;}
.tip-form-btn.save{background:var(--orange);color:var(--black);}
.tip-form-btn.save:disabled{opacity:.5;}
.tip-form-btn.cancel{background:transparent;border:1px solid var(--border-light);color:var(--text-muted);}
.tip-form-error{font-size:11px;color:#e85050;margin-bottom:8px;display:none;}

.footer-note{
  text-align:center;font-size:11px;color:var(--text-dim);margin-top:30px;line-height:1.8;
}
.footer-note img{height:16px;width:auto;display:inline-block;vertical-align:middle;opacity:.5;margin-right:5px;}

.loading-msg{text-align:center;color:var(--text-muted);font-size:12.5px;padding:30px 10px;}

/* 編集モーダル */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;
  display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.modal-overlay.show{display:flex;}
.modal-box{
  background:var(--card);border:1px solid var(--border-light);border-radius:18px 18px 0 0;
  width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column;
  animation:slideUp .3s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-header{
  padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.modal-title{font-size:16px;font-weight:900;}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;line-height:1;padding:4px;}
.modal-scroll{overflow-y:auto;padding:18px 22px;flex:1;}
.modal-field{margin-bottom:18px;}
.modal-label{font-size:12px;color:var(--orange);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.modal-label .num{
  font-family:"JetBrains Mono",monospace;font-size:10.5px;background:var(--orange-bg);
  border:1px solid rgba(232,160,32,.25);width:20px;height:20px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;color:var(--orange);
}
.modal-textarea{
  width:100%;background:var(--black);border:1px solid var(--border-light);border-radius:9px;
  color:var(--text);font-size:13.5px;line-height:1.7;padding:12px 13px;font-family:inherit;
  resize:vertical;min-height:70px;
}
.modal-footer{padding:16px 22px;border-top:1px solid var(--border);flex-shrink:0;
  padding-bottom:calc(16px + env(safe-area-inset-bottom));}
.modal-save-btn{
  width:100%;background:var(--orange);color:var(--black);border:none;border-radius:11px;
  padding:14px;font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:.05em;cursor:pointer;
}
.modal-save-btn:disabled{opacity:.5;}
.modal-error{font-size:11.5px;color:#e85050;margin-bottom:10px;display:none;text-align:center;}

/* ①〜⑨ 画像セクション */
.field-img-section{padding-left:36px;margin-bottom:10px;}
.tip-card .field-img-section{padding-left:0;margin-bottom:10px;}
.field-img-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
.field-img-item{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--black);}
.field-img-item img{width:100%;display:block;cursor:zoom-in;max-height:280px;object-fit:cover;}
.field-img-del{
  position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;
  background:rgba(0,0,0,.65);color:#fff;border:none;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
}
.field-img-add-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  background:var(--orange-bg);border:1px dashed rgba(232,160,32,.35);color:var(--orange);
  border-radius:9px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;
}
.field-img-add-btn:hover{background:rgba(232,160,32,.16);}
.field-img-uploading{font-size:11px;color:var(--text-muted);padding:4px 2px 8px;}

/* 画像拡大表示（ライトボックス） */
.lightbox-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;
  display:none;align-items:center;justify-content:center;padding:24px;
}
.lightbox-overlay.show{display:flex;}
.lightbox-overlay img{max-width:100%;max-height:100%;border-radius:10px;}

/* 下部タブバー */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:300;
  background:rgba(20,20,20,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;justify-content:space-around;
  padding-bottom:env(safe-area-inset-bottom);
}
.tabbar-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  padding:9px 4px 8px;color:var(--text-dim);text-decoration:none;cursor:pointer;
  transition:color .15s;-webkit-tap-highlight-color:transparent;background:none;border:none;font-family:inherit;
}
.tabbar-item svg{width:21px;height:21px;}
.tabbar-item .tb-label{font-size:10px;font-weight:700;letter-spacing:.02em;}
.tabbar-item.active{color:var(--orange);}
.tabbar-item:active{opacity:.7;}
</style>

<script>
window.addEventListener('DOMContentLoaded', function(){
  setTimeout(function(){
    document.getElementById('splash').classList.add('hide');
  }, 500);
});

// ===================== 設定 =====================
const FIELDS = [
  { key: 'content_anatomy',    num: '①', label: '解剖や用語の説明' },
  { key: 'content_probe',      num: '②', label: '使用プローブ' },
  { key: 'content_grip',       num: '③', label: 'プローブの持ち方' },
  { key: 'content_position',   num: '④', label: '当てる部位' },
  { key: 'content_screen',     num: '⑤', label: '見える画面' },
  { key: 'content_operation',  num: '⑥', label: '必要な操作（扇動走査など）' },
  { key: 'content_evaluation', num: '⑦', label: '評価項目' }
];

const REGION_ID = new URLSearchParams(window.location.search).get('id');
let CURRENT_REGION = null;
let ALL_TIPS = [];
let MY_NAME = null;
let ALL_IMAGES = [];
let IMAGE_URL_MAP = {};
let CURRENT_UPLOAD_TARGET = null;

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function formatDate(iso){
  const d = new Date(iso);
  return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}

async function getMyName(){
  if(MY_NAME) return MY_NAME;
  if(!window.CURRENT_UID) return '名無しさん';
  const { data } = await _supabase.from('profiles').select('name').eq('id', window.CURRENT_UID).single();
  MY_NAME = (data && data.name) ? data.name : '名無しさん';
  return MY_NAME;
}

async function loadRegion(){
  if(!REGION_ID){
    document.getElementById('main-content').innerHTML = '<div class="loading-msg">部位が指定されていません</div>';
    return;
  }
  const [{ data, error }, tipsRes] = await Promise.all([
    _supabase.from('technique_regions').select('*').eq('id', REGION_ID).single(),
    _supabase.from('technique_tips').select('*').eq('region_id', REGION_ID).order('created_at', { ascending: true })
  ]);

  if(error || !data){
    document.getElementById('main-content').innerHTML = '<div class="loading-msg">部位が見つかりませんでした</div>';
    return;
  }
  CURRENT_REGION = data;
  ALL_TIPS = tipsRes.data || [];
  await reloadImagesAndUrls();

  document.getElementById('top-title').textContent = data.name;
  if(data.parent_id){
    document.getElementById('back-btn').setAttribute('href', 'technique.html?parent=' + data.parent_id);
  } else {
    document.getElementById('back-btn').setAttribute('href', 'technique.html');
  }

  renderContent();
}

function renderContent(){
  const itemsHtml = FIELDS.map(f => {
    const val = CURRENT_REGION[f.key];
    const bodyClass = val ? 'item-card-body' : 'item-card-body empty';
    const bodyText = val ? escapeHtml(val) : 'まだ入力されていません';
    return (
      '<div class="item-card">' +
        '<div class="item-card-head">' +
          '<div class="item-card-num mono">' + f.num + '</div>' +
          '<div class="item-card-label">' + f.label + '</div>' +
        '</div>' +
        buildFieldImageSection(f.key, null) +
        '<div class="' + bodyClass + '">' + bodyText + '</div>' +
      '</div>'
    );
  }).join('');

  document.getElementById('main-content').innerHTML =
    '<div class="region-hero">' +
      '<div class="region-hero-title">' + escapeHtml(CURRENT_REGION.name) + '</div>' +
      '<div class="region-hero-desc">①〜⑦の基本情報。下の「編集する」からいつでも書き込み・修正できます。</div>' +
    '</div>' +
    '<button class="edit-fab" id="open-edit-btn">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 114 4L7.5 20.5 2 22l1.5-5.5z"/></svg>' +
      '①〜⑦を編集する' +
    '</button>' +
    itemsHtml +
    buildTipSection('mistake', '⑧', 'よくある失敗例') +
    buildTipSection('tip', '⑨', '手技のコツ') +
    '<div class="footer-note"><img src="assets/logo-icon-dark.png" alt="">K-PICS &nbsp;|&nbsp; 学びを、次の代へ。</div>';

  document.getElementById('open-edit-btn').addEventListener('click', openEditModal);
}

// ===================== ⑧⑨ 失敗例・コツ投稿 =====================
let ADDING_TYPE = null;   // 'mistake' | 'tip' | null
let EDITING_TIP_ID = null;

function buildEditTipForm(t){
  return (
    '<div class="tip-card">' +
      buildFieldImageSection(t.tip_type, t.id) +
      '<div class="tip-form" style="margin-bottom:0;">' +
        '<div class="tip-form-error" id="edit-error-' + t.id + '">保存に失敗しました</div>' +
        '<textarea class="tip-textarea" id="edit-textarea-' + t.id + '" rows="3">' + escapeHtml(t.content) + '</textarea>' +
        '<div class="tip-form-actions">' +
          '<button class="tip-form-btn cancel" onclick="cancelEditTip()">キャンセル</button>' +
          '<button class="tip-form-btn save" id="edit-save-' + t.id + '" onclick="saveEditTip(\'' + t.id + '\')">保存する</button>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

function buildTipSection(type, num, label){
  const items = ALL_TIPS.filter(t => t.tip_type === type);

  const itemsHtml = items.map(t => {
    if(EDITING_TIP_ID === t.id) return buildEditTipForm(t);
    const canEdit = window.CURRENT_UID && t.author_id === window.CURRENT_UID;
    const actions = canEdit
      ? '<div class="tip-card-actions">' +
          '<button class="tip-card-action" onclick="startEditTip(\'' + t.id + '\')">編集</button>' +
          '<button class="tip-card-action danger" onclick="deleteTip(\'' + t.id + '\')">削除</button>' +
        '</div>'
      : '';
    return (
      '<div class="tip-card">' +
        buildFieldImageSection(t.tip_type, t.id) +
        '<div class="tip-card-text">' + escapeHtml(t.content) + '</div>' +
        '<div class="tip-card-foot">' +
          '<div class="tip-card-author">' + escapeHtml(t.author_name) + ' ・ ' + formatDate(t.created_at) + '</div>' +
          actions +
        '</div>' +
      '</div>'
    );
  }).join('');

  const emptyHtml = (items.length === 0 && ADDING_TYPE !== type)
    ? '<div class="tip-empty">まだ投稿がありません</div>' : '';

  const addForm = ADDING_TYPE === type
    ? '<div class="tip-form">' +
        '<div class="tip-form-error" id="add-error-' + type + '">投稿に失敗しました</div>' +
        '<textarea class="tip-textarea" id="add-textarea-' + type + '" rows="3" placeholder="内容を入力してください"></textarea>' +
        '<div class="tip-form-actions">' +
          '<button class="tip-form-btn cancel" onclick="cancelAddTip()">キャンセル</button>' +
          '<button class="tip-form-btn save" id="add-save-' + type + '" onclick="submitNewTip(\'' + type + '\')">投稿する</button>' +
        '</div>' +
      '</div>'
    : '';

  const addBtn = ADDING_TYPE === type
    ? ''
    : '<button class="tip-add-btn" onclick="openAddTip(\'' + type + '\')">＋ 追記する</button>';

  return (
    '<div class="tip-section">' +
      '<div class="tip-section-head">' +
        '<div class="tip-section-title"><span class="mono" style="color:var(--orange);">' + num + '</span>' + label + '</div>' +
        addBtn +
      '</div>' +
      addForm + emptyHtml + itemsHtml +
    '</div>'
  );
}

function openAddTip(type){
  ADDING_TYPE = type;
  EDITING_TIP_ID = null;
  renderContent();
  setTimeout(() => { const ta = document.getElementById('add-textarea-' + type); if(ta) ta.focus(); }, 0);
}
function cancelAddTip(){ ADDING_TYPE = null; renderContent(); }

async function submitNewTip(type){
  const ta = document.getElementById('add-textarea-' + type);
  const content = ta.value.trim();
  const errEl = document.getElementById('add-error-' + type);
  if(!content){
    errEl.textContent = '内容を入力してください';
    errEl.style.display = 'block';
    return;
  }
  const btn = document.getElementById('add-save-' + type);
  btn.disabled = true; btn.textContent = '投稿中…';

  const name = await getMyName();
  const { error } = await _supabase.from('technique_tips').insert({
    region_id: REGION_ID,
    tip_type: type,
    content: content,
    author_name: name,
    author_id: window.CURRENT_UID || null
  });

  if(error){
    btn.disabled = false; btn.textContent = '投稿する';
    errEl.textContent = '投稿に失敗しました：' + error.message;
    errEl.style.display = 'block';
    return;
  }

  ADDING_TYPE = null;
  await reloadTips();
  renderContent();
}

function startEditTip(id){ EDITING_TIP_ID = id; ADDING_TYPE = null; renderContent(); }
function cancelEditTip(){ EDITING_TIP_ID = null; renderContent(); }

async function saveEditTip(id){
  const ta = document.getElementById('edit-textarea-' + id);
  const content = ta.value.trim();
  const errEl = document.getElementById('edit-error-' + id);
  if(!content){
    errEl.textContent = '内容を入力してください';
    errEl.style.display = 'block';
    return;
  }
  const btn = document.getElementById('edit-save-' + id);
  btn.disabled = true; btn.textContent = '保存中…';

  const { error } = await _supabase.from('technique_tips').update({ content: content }).eq('id', id);

  if(error){
    btn.disabled = false; btn.textContent = '保存する';
    errEl.textContent = '保存に失敗しました：' + error.message;
    errEl.style.display = 'block';
    return;
  }

  EDITING_TIP_ID = null;
  await reloadTips();
  renderContent();
}

async function deleteTip(id){
  if(!confirm('この投稿を削除しますか？')) return;
  const { error } = await _supabase.from('technique_tips').delete().eq('id', id);
  if(error){ alert('削除に失敗しました：' + error.message); return; }
  await reloadTips();
  renderContent();
}

async function reloadTips(){
  const { data } = await _supabase
    .from('technique_tips')
    .select('*')
    .eq('region_id', REGION_ID)
    .order('created_at', { ascending: true });
  ALL_TIPS = data || [];
}

// ===================== ①〜⑨ 画像 =====================
async function reloadImagesAndUrls(){
  const { data } = await _supabase
    .from('technique_images')
    .select('*')
    .eq('region_id', REGION_ID)
    .order('display_order', { ascending: true });
  ALL_IMAGES = data || [];

  await Promise.all(ALL_IMAGES.map(async img => {
    if(IMAGE_URL_MAP[img.storage_path]) return;
    const { data: sd } = await _supabase.storage.from('technique-images').createSignedUrl(img.storage_path, 3600);
    if(sd) IMAGE_URL_MAP[img.storage_path] = sd.signedUrl;
  }));
}

function buildFieldImageSection(fieldKey, tipId){
  const imgs = ALL_IMAGES.filter(i => i.field_key === fieldKey && (i.tip_id || null) === (tipId || null));
  const targetId = fieldKey + (tipId ? '_' + tipId : '');

  const itemsHtml = imgs.map(img => {
    const url = IMAGE_URL_MAP[img.storage_path] || '';
    return (
      '<div class="field-img-item">' +
        '<img src="' + url + '" alt="" onclick="openLightbox(\'' + url + '\')">' +
        '<button class="field-img-del" onclick="event.stopPropagation();deleteFieldImage(\'' + img.id + '\',\'' + img.storage_path + '\')">&times;</button>' +
      '</div>'
    );
  }).join('');

  const addBtn = imgs.length < 3
    ? '<button class="field-img-add-btn" onclick="startImageUpload(\'' + fieldKey + '\',' + (tipId ? "'" + tipId + "'" : 'null') + ')">＋ 画像を追加（' + imgs.length + '/3）</button>'
    : '';

  return (
    '<div class="field-img-section">' +
      (itemsHtml ? '<div class="field-img-list">' + itemsHtml + '</div>' : '') +
      '<div class="field-img-uploading" id="img-uploading-' + targetId + '" style="display:none;">アップロード中…</div>' +
      addBtn +
    '</div>'
  );
}

function startImageUpload(fieldKey, tipId){
  CURRENT_UPLOAD_TARGET = { fieldKey: fieldKey, tipId: tipId };
  document.getElementById('image-file-input').click();
}

document.getElementById('image-file-input').addEventListener('change', async () => {
  const fileInput = document.getElementById('image-file-input');
  const file = fileInput.files[0];
  fileInput.value = '';
  if(!file || !CURRENT_UPLOAD_TARGET) return;

  const fieldKey = CURRENT_UPLOAD_TARGET.fieldKey;
  const tipId = CURRENT_UPLOAD_TARGET.tipId;
  const existing = ALL_IMAGES.filter(i => i.field_key === fieldKey && (i.tip_id || null) === (tipId || null));
  if(existing.length >= 3){ alert('画像は3枚まで追加できます'); return; }

  const targetId = fieldKey + (tipId ? '_' + tipId : '');
  const uploadingEl = document.getElementById('img-uploading-' + targetId);
  if(uploadingEl) uploadingEl.style.display = 'block';

  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
  const path = REGION_ID + '/' + targetId + '/' + Date.now() + '.' + ext;

  const { error: upErr } = await _supabase.storage.from('technique-images').upload(path, file);
  if(upErr){
    alert('アップロードに失敗しました：' + upErr.message);
    if(uploadingEl) uploadingEl.style.display = 'none';
    return;
  }

  const { error: insErr } = await _supabase.from('technique_images').insert({
    region_id: REGION_ID,
    field_key: fieldKey,
    tip_id: tipId,
    storage_path: path,
    display_order: existing.length
  });
  if(insErr){
    alert('登録に失敗しました：' + insErr.message);
  }

  await reloadImagesAndUrls();
  renderContent();
});

async function deleteFieldImage(id, path){
  if(!confirm('この画像を削除しますか？')) return;
  await _supabase.storage.from('technique-images').remove([path]);
  await _supabase.from('technique_images').delete().eq('id', id);
  delete IMAGE_URL_MAP[path];
  await reloadImagesAndUrls();
  renderContent();
}

function openLightbox(url){
  if(!url) return;
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox-overlay').classList.add('show');
}
document.getElementById('lightbox-overlay').addEventListener('click', () => {
  document.getElementById('lightbox-overlay').classList.remove('show');
  document.getElementById('lightbox-img').src = '';
});

// ===================== 編集モーダル =====================
function openEditModal(){
  const fieldsHtml = FIELDS.map(f => {
    const val = CURRENT_REGION[f.key] || '';
    return (
      '<div class="modal-field">' +
        '<div class="modal-label"><span class="num mono">' + f.num + '</span>' + f.label + '</div>' +
        '<textarea class="modal-textarea" data-key="' + f.key + '" rows="3">' + escapeHtml(val) + '</textarea>' +
      '</div>'
    );
  }).join('');
  document.getElementById('modal-fields').innerHTML = fieldsHtml;
  document.getElementById('edit-error').style.display = 'none';
  document.getElementById('edit-modal').classList.add('show');
}

document.getElementById('edit-modal-close').addEventListener('click', () => {
  document.getElementById('edit-modal').classList.remove('show');
});

document.getElementById('edit-save-btn').addEventListener('click', async () => {
  const textareas = document.querySelectorAll('#modal-fields .modal-textarea');
  const updates = {};
  textareas.forEach(ta => { updates[ta.dataset.key] = ta.value.trim(); });
  updates.updated_at = new Date().toISOString();

  const btn = document.getElementById('edit-save-btn');
  btn.disabled = true;
  btn.textContent = '保存中…';

  const { error } = await _supabase
    .from('technique_regions')
    .update(updates)
    .eq('id', REGION_ID);

  btn.disabled = false;
  btn.textContent = '保存する';

  if(error){
    const errEl = document.getElementById('edit-error');
    errEl.textContent = '保存に失敗しました：' + error.message;
    errEl.style.display = 'block';
    return;
  }

  Object.assign(CURRENT_REGION, updates);
  document.getElementById('edit-modal').classList.remove('show');
  renderContent();
});

loadRegion();
</script>
</body>
</html>
