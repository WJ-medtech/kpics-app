*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--black);}
body{color:var(--text);font-family:"Noto Sans JP",sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}

/* SPLASH */
#splash{

/* HEADER */
.top-header{

  padding:env(safe-area-inset-top) 16px 0;
}
.top-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;height:54px;gap:12px;}
.back-btn{

}
.back-btn:hover{color:var(--orange);}

.doc-hero{text-align:center;padding:18px 10px 28px;}
.doc-hero-icon{

}
.doc-hero-title{font-family:"Noto Sans JP",sans-serif;font-weight:900;font-size:21px;line-height:1.5;margin-bottom:10px;}
.doc-hero-desc{font-size:12.5px;color:var(--text-muted);line-height:1.85;max-width:420px;margin:0 auto;}

/* 疾患カード */
.disease-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.disease-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;

  transition:background .15s,border-color .15s;touch-action:manipulation;
}

.disease-card-num{

.disease-card-body{flex:1;min-width:0;text-decoration:none;color:var(--text);cursor:pointer;}
.disease-card-body:active{opacity:.7;}
.disease-card-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.disease-card-sub{font-size:11px;color:var(--text-muted);}
.disease-card-chevron{color:var(--text-dim);flex-shrink:0;}
.disease-card-chevron svg{width:18px;height:18px;}
.drag-handle{

.drag-handle svg{width:18px;height:18px;}
.drag-handle:active{cursor:grabbing;color:var(--orange);}

.loading-msg, .empty-msg{

/* 追加ボタン */
.add-region-btn{

.modal-overlay{

.modal-btn.cancel{background:transparent;border:1px solid var(--border-light);color:var(--text-muted);}
.modal-btn.confirm{background:var(--orange);color:var(--black);}

.tabbar-item.active{color:var(--orange);}
.tabbar-item:active{opacity:.7;}

<script>
window.addEventListener('DOMContentLoaded', function(){
  setTimeout(function(){
    document.getElementById('splash').classList.add('hide');
  }, 500);
});

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ===================== データ取得・一覧表示 =====================
let ALL_DISEASES = [];

async function loadDiseases(){
  const { data, error } = await _supabase
    .from('diseases')
    .select('id, name, display_order')
    .order('display_order', { ascending: true });

  if(error){
    document.getElementById('disease-list').innerHTML =
      '<div class="empty-msg">読み込みに失敗しました：' + error.message + '</div>';
    return;
  }
  ALL_DISEASES = data || [];
  renderList();
}

function renderList(){
  const listEl = document.getElementById('disease-list');

  if(ALL_DISEASES.length === 0){
    listEl.innerHTML = '<div class="empty-msg">まだ疾患が登録されていません</div>';
    return;
  }

  listEl.innerHTML = ALL_DISEASES.map((d, i) => {
    return (
      '<div class="disease-card" data-id="' + d.id + '">' +
        '<div class="drag-handle" title="ドラッグで並び替え">' +
          '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="8" cy="6" r="1.6"/><circle cx="16" cy="6" r="1.6"/><circle cx="8" cy="12" r="1.6"/><circle cx="16" cy="12" r="1.6"/><circle cx="8" cy="18" r="1.6"/><circle cx="16" cy="18" r="1.6"/></svg>' +
        '</div>' +
        '<div class="disease-card-num mono">' + String(i+1).padStart(2,'0') + '</div>' +
        '<a class="disease-card-body" href="disease-detail.html?id=' + d.id + '">' +
          '<div class="disease-card-name">' + escapeHtml(d.name) + '</div>' +
          '<div class="disease-card-sub">①〜⑥の詳細を見る</div>' +
        '</a>' +
        '<div class="disease-card-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></div>' +
      '</div>'
    );
  }).join('');

  attachDragHandlers();
}

// ===================== ドラッグ＆ドロップ並び替え =====================
function attachDragHandlers(){
  document.querySelectorAll('.drag-handle').forEach(handle => {
    handle.addEventListener('pointerdown', onDragStart);
  });
}

let DRAG_EL = null;

function onDragStart(e){
  const card = e.currentTarget.closest('.disease-card');
  if(!card) return;
  e.preventDefault();
  DRAG_EL = card;
  card.classList.add('dragging');

  window.addEventListener('pointermove', onDragMove);
  window.addEventListener('pointerup', onDragEnd);
}

function onDragMove(e){
  if(!DRAG_EL) return;
  const listEl = document.getElementById('disease-list');
  const siblings = Array.from(listEl.querySelectorAll('.disease-card')).filter(el => el !== DRAG_EL);

  let target = null;
  for(const sib of siblings){
    const rect = sib.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    if(e.clientY < midY){ target = sib; break; }
  }

  if(target){
    listEl.insertBefore(DRAG_EL, target);
  } else {
    listEl.appendChild(DRAG_EL);
  }
}

async function onDragEnd(){
  window.removeEventListener('pointermove', onDragMove);
  window.removeEventListener('pointerup', onDragEnd);
  if(!DRAG_EL) return;
  DRAG_EL.classList.remove('dragging');
  DRAG_EL = null;

  // 番号バッジを振り直す
  const listEl = document.getElementById('disease-list');
  const cards = Array.from(listEl.querySelectorAll('.disease-card'));
  cards.forEach((card, i) => {
    card.querySelector('.disease-card-num').textContent = String(i+1).padStart(2,'0');
  });

  // 新しい並び順をDBに保存
  const ids = cards.map(c => c.dataset.id);
  await Promise.all(ids.map((id, i) =>
    _supabase.from('diseases').update({ display_order: i }).eq('id', id)
  ));
  ALL_DISEASES = ids.map((id, i) => ({ id, display_order: i }));
}

// ===================== 疾患を追加 =====================
document.getElementById('add-disease-open').addEventListener('click', () => {
  document.getElementById('new-disease-name').value = '';
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('add-modal').classList.add('show');
});
document.getElementById('add-modal-cancel').addEventListener('click', () => {
  document.getElementById('add-modal').classList.remove('show');
});

document.getElementById('add-modal-confirm').addEventListener('click', async () => {
  const name = document.getElementById('new-disease-name').value.trim();
  const errEl = document.getElementById('modal-error');

  if(!name){
    errEl.textContent = '疾患名を入力してください';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('add-modal-confirm');
  btn.disabled = true;
  btn.textContent = '追加中…';

  const maxOrder = ALL_DISEASES.reduce((m, d) => Math.max(m, d.display_order || 0), 0);

  const { error } = await _supabase.from('diseases').insert({
    name: name,
    display_order: maxOrder + 1
  });

  btn.disabled = false;
  btn.textContent = '追加する';

  if(error){
    errEl.textContent = '追加に失敗しました：' + error.message;
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('add-modal').classList.remove('show');
  await loadDiseases();
});

loadDiseases();
</script>
